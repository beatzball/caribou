name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
        with: { version: 10.28.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Generate Litro routes + page manifest
        run: pnpm --filter caribou-elena build
      - name: Compute affected filter
        id: affected
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "args=--filter ...[origin/${{ github.base_ref }}]" >> $GITHUB_OUTPUT
          else
            echo "args=-r" >> $GITHUB_OUTPUT
          fi
      - run: pnpm ${{ steps.affected.outputs.args }} typecheck
      - run: pnpm ${{ steps.affected.outputs.args }} lint
      - run: pnpm ${{ steps.affected.outputs.args }} test:coverage
      - if: always()
        uses: actions/upload-artifact@v4
        with: { name: coverage, path: '**/coverage/**' }

  e2e:
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.28.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter caribou-elena exec playwright install --with-deps chromium firefox webkit
      - run: pnpm build
      - run: pnpm test:e2e
      - if: failure()
        uses: actions/upload-artifact@v4
        with: { name: playwright-report, path: apps/caribou-elena/playwright-report }

  changeset-check:
    # Skip on the bot-authored release PR, which legitimately consumes all
    # pending changesets — `changeset status` treats "packages changed but
    # no changesets" as a hard error, which is the whole point of that PR.
    if: github.event_name == 'pull_request' && github.head_ref != 'changeset-release/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
        with: { version: 10.28.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm changeset status --since=origin/main

  # Build the exact Docker image that Coolify will deploy, run it, and probe
  # it with the same checks verify-prod runs against caribou.quest. Catches
  # the "works in dev, 500s in prod" class of bug that slipped through
  # checks+e2e (which run with hoisted node_modules) — e.g. a server module
  # that does `readFileSync(require.resolve('@workspace/pkg/file'))` at init
  # works locally but throws MODULE_NOT_FOUND in the runtime image, which
  # ships only `dist/`.
  smoke-image:
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: docker/setup-buildx-action@v3
      - name: Build caribou-elena image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/caribou-elena/Dockerfile
          load: true
          tags: caribou-elena:ci
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run container
        run: docker run -d --rm -p 3000:3000 --name caribou-smoke caribou-elena:ci
      - name: Probe container
        env:
          CARIBOU_BASE_URL: http://localhost:3000
          CARIBOU_SKIP_SHA_ASSERT: '1'
          CARIBOU_PROBE_RETRIES: '15'
          CARIBOU_PROBE_DELAY_MS: '2000'
        run: node scripts/verify-prod.mjs
      - name: Container logs
        if: always()
        run: docker logs caribou-smoke || true
      - name: Stop container
        if: always()
        run: docker stop caribou-smoke || true

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [checks, e2e, smoke-image]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy
        run: |
          curl -fSsL -X POST \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            "${{ secrets.COOLIFY_WEBHOOK_URL }}"

  verify-prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: Probe caribou.quest
        env:
          CARIBOU_BASE_URL: https://caribou.quest
          GITHUB_SHA: ${{ github.sha }}
        run: node scripts/verify-prod.mjs
