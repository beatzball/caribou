name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
        with: { version: 10.28.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - uses: changesets/action@v1
        with:
          version: pnpm changeset version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          # PRs/pushes authored with CHANGESETS_TOKEN (a fine-grained PAT)
          # are attributed to the token's owner, so GitHub triggers CI on
          # the resulting `changeset-release/main` PR. Using the default
          # GITHUB_TOKEN instead attributes events to github-actions[bot],
          # which GitHub intentionally doesn't run workflows for — leaving
          # the release PR with indefinitely-pending checks. Falls back to
          # GITHUB_TOKEN so the workflow still functions if the secret is
          # unset (CI just won't auto-run on the opened PR, same as before).
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_TOKEN || secrets.GITHUB_TOKEN }}
